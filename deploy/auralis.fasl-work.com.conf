# Rate-limit zones — must live in the http context. This file is loaded
# from /etc/nginx/sites-enabled/ via include in nginx.conf's http block,
# so directives outside `server {}` here ARE in http context.
#   audio: 10 req/s per IP, burst 20  (audio assets are heavy; one user
#          loading the library produces a steady ~1 req/s, so 10 r/s
#          comfortably absorbs prefetching while blocking scrapers).
#   api:   20 req/s per IP, burst 40  (manifest + per-clip JSONs).
limit_req_zone $binary_remote_addr zone=auralis_audio:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auralis_api:10m   rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name auralis.fasl-work.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auralis.fasl-work.com;

    ssl_certificate     /etc/letsencrypt/live/auralis.fasl-work.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auralis.fasl-work.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml image/svg+xml application/wasm;
    gzip_min_length 1024;

    # The frontend bundle is small (~300 KB) but per-clip embedding JSONs
    # can reach a few hundred KB; gzip is essential. Audio files are
    # served by FastAPI directly (range-request friendly).
    client_max_body_size 2m;

    # Serve the built frontend hashed assets straight from disk for
    # max throughput. FastAPI's spa_fallback handles index.html + routes.
    location /assets/ {
        alias /opt/fasl-apps/CAOS_6D_Sounds/frontend/dist/assets/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Cached audio payloads — large but immutable per clip id. Rate-limited
    # per IP so a misbehaving client cannot saturate VPS egress.
    location /audio/ {
        limit_req zone=auralis_audio burst=20 nodelay;
        proxy_pass http://127.0.0.1:8104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # JSON API (manifest, per-clip metadata, embeddings). Rate-limited too.
    location /api/ {
        limit_req zone=auralis_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA shell. The HTML is tiny but references hash-named bundles, so
    # caching it (or any catch-all upstream response) makes the browser
    # ask for stale `index-XXXX.js` after a redeploy and the page goes
    # white. Force revalidation on every load.
    location / {
        proxy_pass http://127.0.0.1:8104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
