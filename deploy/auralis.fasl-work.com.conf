server {
    listen 80;
    listen [::]:80;
    server_name auralis.fasl-work.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auralis.fasl-work.com;

    ssl_certificate     /etc/letsencrypt/live/auralis.fasl-work.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auralis.fasl-work.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml image/svg+xml application/wasm;
    gzip_min_length 1024;

    # The frontend bundle is small (~300 KB) but per-clip embedding JSONs
    # can reach a few hundred KB; gzip is essential. Audio files are
    # served by FastAPI directly (range-request friendly).
    client_max_body_size 2m;

    # Serve the built frontend hashed assets straight from disk for
    # max throughput. FastAPI's spa_fallback handles index.html + routes.
    location /assets/ {
        alias /opt/fasl-apps/CAOS_6D_Sounds/frontend/dist/assets/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Cached audio + embedding payloads — large but immutable per clip id.
    location /audio/ {
        proxy_pass http://127.0.0.1:8104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://127.0.0.1:8104;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
