<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="cmap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#440154"/>
      <stop offset="25%" stop-color="#3b528b"/>
      <stop offset="50%" stop-color="#21908d"/>
      <stop offset="75%" stop-color="#5dc863"/>
      <stop offset="100%" stop-color="#fde725"/>
    </linearGradient>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="900" height="380" fill="#0d1117"/>

  <text x="450" y="36" text-anchor="middle" fill="url(#g)" font-size="20" font-weight="600">
    Auralis — 6D mapping in the visualization
  </text>

  <!-- Input vector -->
  <g>
    <rect x="60" y="80" width="240" height="240" rx="8" fill="#161b22" stroke="#30363d"/>
    <text x="180" y="106" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500">6D vector at time t</text>
    <text x="180" y="124" text-anchor="middle" fill="#8b949e" font-size="11">v = [v1, v2, v3, v4, v5, v6]</text>

    <g font-family="ui-monospace, SFMono-Regular, monospace" font-size="13">
      <text x="80" y="170" fill="#ef4444">v1</text>
      <text x="160" y="170" fill="#e6edf3">0.12</text>
      <text x="80" y="195" fill="#22c55e">v2</text>
      <text x="160" y="195" fill="#e6edf3">0.45</text>
      <text x="80" y="220" fill="#3b82f6">v3</text>
      <text x="160" y="220" fill="#e6edf3">0.21</text>
      <text x="80" y="245" fill="#a78bfa">v4</text>
      <text x="160" y="245" fill="#e6edf3">0.58</text>
      <text x="80" y="270" fill="#22d3ee">v5</text>
      <text x="160" y="270" fill="#e6edf3">0.32</text>
      <text x="80" y="295" fill="#94a3b8">v6</text>
      <text x="160" y="295" fill="#e6edf3">(time)</text>
    </g>
  </g>

  <!-- Mapping -->
  <g font-size="12">
    <text x="370" y="170" fill="#ef4444">v1 → X</text>
    <text x="370" y="195" fill="#22c55e">v2 → Y</text>
    <text x="370" y="220" fill="#3b82f6">v3 → Z</text>
    <text x="370" y="245" fill="#a78bfa">v4 → color</text>
    <text x="370" y="270" fill="#22d3ee">v5 → size</text>
    <text x="370" y="295" fill="#94a3b8">v6 = time</text>
  </g>

  <line x1="320" y1="200" x2="360" y2="200" stroke="#8b949e" marker-end="url(#a2)"/>

  <!-- Output: scene example -->
  <g>
    <rect x="500" y="80" width="340" height="240" rx="8" fill="#161b22" stroke="#06b6d4"/>
    <text x="670" y="106" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="500">
      Resulting frame in the 3D scene
    </text>

    <!-- Trail of spheres along a curve -->
    <g>
      <path d="M 540 280 Q 600 260, 650 220 T 800 150" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
      <circle cx="540" cy="280" r="5" fill="#440154" opacity="0.3"/>
      <circle cx="568" cy="270" r="6" fill="#3b528b" opacity="0.45"/>
      <circle cx="595" cy="258" r="7" fill="#21908d" opacity="0.6"/>
      <circle cx="625" cy="240" r="8" fill="#5dc863" opacity="0.75"/>
      <circle cx="660" cy="216" r="10" fill="#fde725" opacity="0.9"/>
      <circle cx="700" cy="190" r="12" fill="#fde725" opacity="1.0"/>
      <circle cx="700" cy="190" r="14" fill="none" stroke="#fde725" opacity="0.5"/>
      <text x="715" y="195" fill="#fde725" font-size="11">current frame</text>
    </g>

    <!-- Colormap legend -->
    <rect x="540" y="290" width="260" height="10" fill="url(#cmap)" rx="2"/>
    <text x="540" y="316" fill="#8b949e" font-size="10">v4 = 0   (low)</text>
    <text x="800" y="316" text-anchor="end" fill="#8b949e" font-size="10">(high)   v4 = 1</text>
  </g>
</svg>
