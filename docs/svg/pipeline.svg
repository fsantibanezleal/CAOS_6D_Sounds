<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect width="940" height="360" fill="#0d1117"/>

  <text x="470" y="36" text-anchor="middle" fill="url(#g)" font-size="20" font-weight="600">
    Auralis — data pipeline (offline)
  </text>

  <!-- Step 1: audio -->
  <rect x="40" y="84" width="160" height="100" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="120" y="108" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500">1. Audio</text>
  <text x="120" y="130" text-anchor="middle" fill="#8b949e" font-size="11">22050 Hz mono</text>
  <text x="120" y="148" text-anchor="middle" fill="#8b949e" font-size="11">window 100 ms</text>
  <text x="120" y="166" text-anchor="middle" fill="#8b949e" font-size="11">hop 50 ms</text>

  <!-- Step 2: features -->
  <rect x="220" y="84" width="180" height="100" rx="8" fill="#161b22" stroke="#7c3aed"/>
  <text x="310" y="108" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="500">2. Per-frame features</text>
  <text x="310" y="130" text-anchor="middle" fill="#8b949e" font-size="11">RMS · ZCR · centroid</text>
  <text x="310" y="148" text-anchor="middle" fill="#8b949e" font-size="11">rolloff · bandwidth · flatness</text>
  <text x="310" y="166" text-anchor="middle" fill="#8b949e" font-size="11">contrast · pitch · onset</text>

  <!-- Step 3: MFCC -->
  <rect x="420" y="84" width="160" height="100" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="500" y="108" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="500">3. MFCC matrix</text>
  <text x="500" y="130" text-anchor="middle" fill="#8b949e" font-size="11">(num_frames, 13)</text>
  <text x="500" y="148" text-anchor="middle" fill="#8b949e" font-size="11">across all clips</text>
  <text x="500" y="166" text-anchor="middle" fill="#8b949e" font-size="11">concatenated</text>

  <!-- Step 4: projections -->
  <rect x="600" y="84" width="160" height="100" rx="8" fill="#161b22" stroke="#06b6d4"/>
  <text x="680" y="108" text-anchor="middle" fill="#06b6d4" font-size="13" font-weight="500">4. Projections</text>
  <text x="680" y="130" text-anchor="middle" fill="#8b949e" font-size="11">PCA → 6D</text>
  <text x="680" y="148" text-anchor="middle" fill="#8b949e" font-size="11">t-SNE → 3+3</text>
  <text x="680" y="166" text-anchor="middle" fill="#8b949e" font-size="11">UMAP → 6D</text>

  <!-- Step 5: normalize -->
  <rect x="780" y="84" width="120" height="100" rx="8" fill="#161b22" stroke="#22d3ee"/>
  <text x="840" y="108" text-anchor="middle" fill="#22d3ee" font-size="13" font-weight="500">5. Normalize</text>
  <text x="840" y="130" text-anchor="middle" fill="#8b949e" font-size="11">[0, 1] per</text>
  <text x="840" y="148" text-anchor="middle" fill="#8b949e" font-size="11">dimension</text>

  <!-- Output -->
  <rect x="320" y="234" width="300" height="80" rx="8" fill="#161b22" stroke="#a78bfa"/>
  <text x="470" y="258" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="500">data/embeddings/&lt;id&gt;.json</text>
  <text x="470" y="278" text-anchor="middle" fill="#8b949e" font-size="11">tracks=[features, pca, tsne, umap]</text>
  <text x="470" y="296" text-anchor="middle" fill="#8b949e" font-size="11">each (num_frames, 6) normalized</text>

  <!-- Arrows -->
  <line x1="200" y1="134" x2="220" y2="134" stroke="#8b949e" marker-end="url(#ar)"/>
  <line x1="400" y1="134" x2="420" y2="134" stroke="#8b949e" marker-end="url(#ar)"/>
  <line x1="580" y1="134" x2="600" y2="134" stroke="#8b949e" marker-end="url(#ar)"/>
  <line x1="760" y1="134" x2="780" y2="134" stroke="#8b949e" marker-end="url(#ar)"/>

  <line x1="840" y1="184" x2="840" y2="240" stroke="#8b949e" stroke-dasharray="4 3"/>
  <line x1="840" y1="240" x2="620" y2="240" stroke="#8b949e" stroke-dasharray="4 3"/>
  <line x1="620" y1="240" x2="620" y2="234" stroke="#8b949e" marker-end="url(#ar)"/>

  <line x1="310" y1="184" x2="310" y2="240" stroke="#8b949e" stroke-dasharray="4 3"/>
  <line x1="310" y1="240" x2="320" y2="240" stroke="#8b949e" marker-end="url(#ar)"/>
</svg>
